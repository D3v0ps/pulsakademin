# Temporary diagnostic: list what the SFTP user actually sees on one.com.
# Triggers only when this file changes. Safe to delete after we read the logs.
name: Diagnose one.com SFTP
on:
  push:
    branches: [claude/peaceful-cannon-h2R5N]
    paths: [".github/workflows/diagnose.yml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y lftp
      - name: List remote filesystem via SFTP
        env:
          SFTP_HOST: ${{ secrets.ONECOM_SFTP_HOST }}
          SFTP_USER: ${{ secrets.ONECOM_SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.ONECOM_SFTP_PASS }}
          SFTP_PORT: ${{ secrets.ONECOM_SFTP_PORT }}
          REMOTE_DIR: ${{ secrets.ONECOM_REMOTE_DIR }}
        run: |
          PORT="${SFTP_PORT:-22}"
          run() { lftp -u "$SFTP_USER" --env-password -p "$PORT" "sftp://$SFTP_HOST" -e "set sftp:auto-confirm yes; set net:timeout 25; $1; bye"; }
          echo "=== pwd (where SFTP login lands) ==="           ; run "pwd" || true
          echo "=== ls / ==="                                   ; run "cls -la /" || true
          echo "=== ls /webroots/ ==="                          ; run "cls -la /webroots/" || true
          echo "=== ls REMOTE_DIR secret (where we deployed) ===" ; run "cls -la \"$REMOTE_DIR\"" || true
          echo "=== ls /webroots/4e82917c/ (pulsakademin docroot) ===" ; run "cls -la /webroots/4e82917c/" || true
