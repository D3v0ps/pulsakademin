<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Produkt | PulsAkademin</title>
<meta name="description" content="Hjärtstartare och tillbehör – PulsAkademin">
<link rel="stylesheet" href="styles.css">
<style>
  .pdp{ display:grid; grid-template-columns:1fr 380px; gap:48px; align-items:start; }
  @media (max-width:980px){ .pdp{ grid-template-columns:1fr; } .buybox{ position:static !important; } }
  .buybox{ position:sticky; top:96px; }
  .gallery{ display:grid; grid-template-columns:72px 1fr; gap:14px; }
  .gallery .thumbs{ display:flex; flex-direction:column; gap:10px; }
  .gallery .thumbs .ph{ aspect-ratio:1; border-radius:var(--r-sm); cursor:pointer; }
  .gallery .thumbs .ph.sel{ outline:2px solid var(--bordeaux-700); }
  .gallery .main .ph{ aspect-ratio:1; border-radius:var(--r-lg); }
  @media (max-width:560px){ .gallery{ grid-template-columns:1fr; } .gallery .thumbs{ flex-direction:row; } }
  .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tabs button{ padding:14px 18px; font-weight:600; border-bottom:3px solid transparent; margin-bottom:-1px; }
  .tabs button.on{ border-color:var(--coral); color:var(--bordeaux-700); }
  .spec-table td{ padding:12px 0; border-bottom:1px solid var(--line); font-size:15px; }
  .spec-table td:first-child{ color:var(--muted); width:45%; }
  .usp li{ display:flex; gap:10px; padding:6px 0; }
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <section class="section" style="padding-top:28px" data-screen-label="Produktdetalj">
    <div class="container">
      <nav class="crumbs mb-24">
        <a href="index.html">Hem</a><span class="sep">/</span><a href="webbshop.html">Webbshop</a><span class="sep">/</span><a href="hjartstartare.html">Hjärtstartare</a><span class="sep">/</span><span id="crumb-name">Produkt</span>
      </nav>

      <div class="pdp">
        <!-- left: gallery + tabs — populated by JS -->
        <div id="pdp-wrap">
          <div style="padding:60px 0;text-align:center;color:var(--muted)">Laddar produkt…</div>
        </div>

        <!-- right: buy box — populated by JS -->
        <aside class="buybox" id="pdp-buybox"></aside>
      </div>

      <!-- cross-sell -->
      <h2 class="h2 mt-48 mb-24">Komplettera ditt köp</h2>
      <div class="grid cols-4" id="crossGrid"></div>
    </div>
  </section>
</main>

<div class="mobile-action" id="pdp-mobile-bar">
  <div style="flex:1"><span class="price-from">…</span></div>
  <button class="btn btn--primary js-mob-add" style="flex:1">Lägg i kundvagn</button>
</div>
<div id="site-footer"></div>

<script src="app/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/supabase.js"></script>
<script src="app/cart.js"></script>
<script src="app/db.js"></script>
<script src="data.js"></script>
<script src="app/features/shop.js"></script>
<script src="site.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    PA.shop.initProdukt();
  });
</script>
</body>
</html>
