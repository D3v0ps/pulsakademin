<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boka kurs – steg för steg | PulsAkademin</title>
<meta name="description" content="Boka din HLR-kurs i fem enkla steg: välj kurs, datum, deltagare, kontaktuppgifter och bekräftelse.">
<link rel="stylesheet" href="styles.css">
<style>
  .flow{ display:grid; grid-template-columns:1fr 340px; gap:40px; align-items:start; }
  @media (max-width:920px){ .flow{ grid-template-columns:1fr; } .flow-aside{ position:static; } }
  .flow-aside{ position:sticky; top:96px; }
  .partrow{ display:grid; grid-template-columns:1fr 1fr auto; gap:14px; align-items:end; padding:14px; background:var(--cream); border:1px solid var(--line); border-radius:var(--r-md); margin-bottom:0; }
  @media (max-width:560px){ .partrow{ grid-template-columns:1fr; } .steps li::after{ display:none } }
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <section class="pagehead">
    <div class="container">
      <nav class="crumbs mb-24"><a href="index.html">Hem</a><span class="sep">/</span><a href="boka.html">Boka kurs</a><span class="sep">/</span><span>Bokning</span></nav>
      <ol class="steps mb-24" id="flowSteps">
        <li class="active"><span class="n">1</span> Tillfälle</li>
        <li><span class="n">2</span> Deltagare</li>
        <li><span class="n">3</span> Kontakt</li>
        <li><span class="n">4</span> Granska</li>
        <li><span class="n">5</span> Skicka</li>
      </ol>
    </div>
  </section>

  <section class="section" style="padding-top:0">
    <div class="container flow">
      <div>
        <div id="flowContent">
          <!-- populated by booking.js -->
          <div class="muted" style="padding:40px 0;text-align:center">Laddar bokningsformulär…</div>
        </div>
        <div id="flowConfirm" style="display:none"></div>
      </div>
      <aside class="flow-aside" id="flowAside">
        <!-- populated by booking.js -->
      </aside>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="site.js"></script>
<script src="data.js"></script>
<script src="app/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/supabase.js"></script>
<script src="app/cart.js"></script>
<script src="app/auth.js"></script>
<script src="app/db.js"></script>
<script src="app/features/booking.js"></script>
</body>
</html>
