<link rel="stylesheet" href="styles.css">
<style>
  .course-layout { display:grid; grid-template-columns: 1fr 360px; gap:48px; align-items:start; }
  @media (max-width:980px){ .course-layout{ grid-template-columns:1fr; } .bookbox{ position:static !important; } }
  .bookbox { position:sticky; top:96px; }
  .infogrid { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--r-md); overflow:hidden; }
  .infogrid div { background:var(--paper); padding:16px 18px; }
  .infogrid b { display:block; font-size:13px; color:var(--muted); font-weight:500; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
  .learn-list li { display:flex; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
  .learn-list .ck { color:var(--green); flex:0 0 auto; }
</style>
</head>
