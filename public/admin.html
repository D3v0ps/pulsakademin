<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Dashboard | PulsAkademin</title>
<meta name="description" content="Adminpanel för PulsAkademin.">
<link rel="stylesheet" href="styles.css">
<script src="app/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/supabase.js"></script>
<script src="app/auth.js"></script>
<script src="app/db.js"></script>
<style>
  body{ background:var(--cream-200); }
  .admin{ display:grid; grid-template-columns:248px 1fr; min-height:100vh; }
  .asidebar{ background:var(--ink); color:var(--cream); padding:20px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .asidebar .logo{ color:var(--cream); margin-bottom:24px; padding:0 8px; }
  .asidebar .logo b{ color:var(--coral); }
  .asidebar a{ display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:var(--r-sm); color:rgba(251,246,240,.72); font-weight:500; font-size:14.5px; margin-bottom:2px; }
  .asidebar a.on{ background:var(--bordeaux-700); color:#fff; }
  .asidebar a:not(.on):hover{ background:rgba(255,255,255,.07); color:#fff; }
  .asidebar h6{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:rgba(251,246,240,.4); margin:18px 12px 8px; }
  .amain{ padding:clamp(20px,3vw,38px); }
  .atop{ display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
  .kpi4{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  @media (max-width:1100px){ .kpi4{ grid-template-columns:repeat(2,1fr); } }
  .kpi4 .card__body b{ font-family:var(--font-display); font-size:2rem; font-weight:800; line-height:1; display:block; }
  .acols{ display:grid; grid-template-columns:1.5fr 1fr; gap:20px; }
  @media (max-width:1000px){ .acols{ grid-template-columns:1fr; } }
  .arow{ display:flex; justify-content:space-between; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--line); }
  .arow:last-child{ border:0; }
  @media (max-width:860px){ .admin{ grid-template-columns:1fr; } .asidebar{ position:static; height:auto; display:flex; flex-wrap:wrap; gap:4px; } .asidebar .logo,.asidebar h6{ width:100%; } .asidebar a{ margin:0; } }
  /* top bar user area */
  .admin-user{ display:flex; align-items:center; gap:10px; }
  .admin-user__meta{ display:flex; flex-direction:column; text-align:right; font-size:13px; line-height:1.3; }
  .admin-user__meta strong{ font-size:14px; }
  .admin-user__meta span{ color:var(--muted); }
  #admin-logout{ font-size:13px; padding:6px 14px; }
</style>
</head>
<body>
<div class="admin">
  <!-- sidebar -->
  <aside class="asidebar" id="admin-sidebar">
    <a href="index.html" class="logo"><span class="mark" style="width:34px;height:34px"><svg width="20" height="20" viewBox="0 0 60 24"><path d="M0 12h12l4-9 6 18 5-13 4 8h20" fill="none" stroke="#FBF6F0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Puls<b>Admin</b></a>
    <nav>
      <a class="on" href="#" data-view="dashboard">📊 Dashboard</a>
      <h6>Utbildning</h6>
      <a href="#" data-view="courses">🎓 Kurser</a>
      <a href="#" data-view="course_instances">📅 Kurstillfällen</a>
      <h6>Försäljning</h6>
      <a href="#" data-view="quote_requests">📝 Offertförfrågningar</a>
      <a href="#" data-view="orders">🛒 Ordrar</a>
      <a href="#" data-view="products">📦 Produkter</a>
      <h6>Övrigt</h6>
      <a href="#" data-view="bookings">🗓️ Bokningar</a>
      <a href="#" data-view="contact_messages">✉️ Kontaktmeddelanden</a>
    </nav>
  </aside>

  <!-- main -->
  <main class="amain">
    <div class="atop" id="admin-topbar">
      <div>
        <h1 class="h2" style="font-size:1.7rem" id="admin-page-title">Dashboard</h1>
        <p class="muted" style="font-size:14px">PulsAkademin adminpanel</p>
      </div>
      <div class="admin-user flex gap-8 center">
        <div class="admin-user__meta">
          <strong id="admin-user-name"></strong>
          <span id="admin-user-email"></span>
        </div>
        <span class="feature__ic" id="admin-user-avatar" style="background:var(--bordeaux-700);color:#fff;font-size:14px;font-weight:700"></span>
        <a href="#" id="admin-logout" class="btn btn--outline btn--sm">Logga ut</a>
      </div>
    </div>

    <!-- dynamic content area -->
    <div id="admin-main" style="min-height:200px">
      <div style="padding:36px 0;text-align:center;color:var(--muted);font-size:15px">Laddar…</div>
    </div>
  </main>
</div>
<script src="site.js"></script>
<script src="app/features/admin.js"></script>
</body>
</html>
