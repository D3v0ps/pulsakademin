<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mina sidor | PulsAkademin</title>
<meta name="description" content="Din portal hos PulsAkademin – kurser, kompetensbevis, beställningar och påminnelser.">
<link rel="stylesheet" href="styles.css">
<style>
  .portal{ display:grid; grid-template-columns:250px 1fr; gap:36px; align-items:start; }
  @media (max-width:860px){ .portal{ grid-template-columns:1fr; } .portal-nav{ position:static; } }
  .portal-nav{ position:sticky; top:96px; }
  .portal-nav a{ display:flex; align-items:center; gap:11px; padding:11px 14px; border-radius:var(--r-sm); font-weight:600; font-size:15px; color:var(--ink-700); text-decoration:none; }
  .portal-nav a.on{ background:var(--bordeaux-700); color:#fff; }
  .portal-nav a:not(.on):hover{ background:var(--cream-200); }
  .kpi{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  @media (max-width:560px){ .kpi{ grid-template-columns:1fr; } }
  .kpi .card__body b{ font-family:var(--font-display); font-size:1.9rem; font-weight:800; display:block; line-height:1; }
  .listrow{ display:flex; justify-content:space-between; align-items:center; gap:16px; padding:16px; border-bottom:1px solid var(--line); }
  .listrow:last-child{ border:0; }
  /* account feature helpers */
  .pa-loading-row{ padding:24px; text-align:center; color:var(--muted); font-size:14px; }
  .pa-logout-link:hover{ background:var(--cream-200) !important; color:var(--ink) !important; }
  .pa-notice{
    background:var(--danger-bg,#fdf0ef); color:var(--danger,#c0392b);
    border:1px solid var(--danger,#c0392b); border-radius:var(--r-sm);
    padding:12px 16px; font-size:14px; margin-bottom:18px;
  }
  .pa-field-err{ font-size:13px; color:var(--danger,#c0392b); margin-top:2px; display:block; }
  .badge--bordeaux{ background:var(--bordeaux-100,#f9edf1); color:var(--bordeaux-800,#6b1f3a); }
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <div id="pa-portal-root">
    <!-- Filled by account.js: either gated state or full portal dashboard -->
    <section class="section" style="padding-block:clamp(28px,4vw,48px)">
      <div class="container" style="text-align:center;color:var(--muted)">Laddar…</div>
    </section>
  </div>
</main>

<div id="site-footer"></div>
<script src="app/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/supabase.js"></script>
<script src="app/cms.js"></script>
<script src="app/auth.js"></script>
<script src="app/db.js"></script>
<script src="app/features/account.js"></script>
<script src="site.js"></script>
</body>
</html>
